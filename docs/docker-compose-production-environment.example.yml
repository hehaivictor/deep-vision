services:
  deepvision:
    environment:
      # ===== 配置来源与客户端初始化 =====
      CONFIG_RESOLUTION_MODE: "auto"
      AI_CLIENT_EAGER_INIT: "false"
      AI_CLIENT_INIT_CONNECTION_TEST: "false"

      # ===== 默认回落网关 =====
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      ANTHROPIC_BASE_URL: "https://qegilibrvucj.sealosbja.site/"
      ANTHROPIC_USE_BEARER_AUTH: "true"

      # ===== 按链路网关与鉴权 =====
      QUESTION_API_KEY: "${QUESTION_API_KEY}"
      QUESTION_BASE_URL: "https://qegilibrvucj.sealosbja.site/"
      QUESTION_USE_BEARER_AUTH: "true"
      QUESTION_DEEP_API_KEY: "${QUESTION_DEEP_API_KEY}"
      QUESTION_DEEP_BASE_URL: "https://qegilibrvucj.sealosbja.site/"
      QUESTION_DEEP_USE_BEARER_AUTH: "true"
      REPORT_API_KEY: "${REPORT_API_KEY}"
      REPORT_BASE_URL: "https://qegilibrvucj.sealosbja.site/"
      REPORT_USE_BEARER_AUTH: "true"
      REPORT_DRAFT_API_KEY: "${REPORT_DRAFT_API_KEY}"
      REPORT_DRAFT_BASE_URL: "https://qegilibrvucj.sealosbja.site/"
      REPORT_DRAFT_USE_BEARER_AUTH: "true"
      REPORT_REVIEW_API_KEY: "${REPORT_REVIEW_API_KEY}"
      REPORT_REVIEW_BASE_URL: "https://qegilibrvucj.sealosbja.site/"
      REPORT_REVIEW_USE_BEARER_AUTH: "true"
      SUMMARY_API_KEY: "${SUMMARY_API_KEY}"
      SUMMARY_BASE_URL: "https://qegilibrvucj.sealosbja.site/"
      SUMMARY_USE_BEARER_AUTH: "true"
      SEARCH_DECISION_API_KEY: "${SEARCH_DECISION_API_KEY}"
      SEARCH_DECISION_BASE_URL: "https://qegilibrvucj.sealosbja.site/"
      SEARCH_DECISION_USE_BEARER_AUTH: "true"
      ASSESSMENT_API_KEY: "${ASSESSMENT_API_KEY}"
      ASSESSMENT_BASE_URL: "https://qegilibrvucj.sealosbja.site/"
      ASSESSMENT_USE_BEARER_AUTH: "true"

      # ===== 服务部署与 Gunicorn =====
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "5001"
      GUNICORN_WORKERS: "8"
      GUNICORN_THREADS: "2"
      GUNICORN_TIMEOUT: "120"
      GUNICORN_GRACEFUL_TIMEOUT: "30"
      GUNICORN_KEEPALIVE: "5"
      GUNICORN_WORKER_CLASS: "gthread"
      GUNICORN_LOG_LEVEL: "info"
      GUNICORN_ACCESSLOG: "-"
      GUNICORN_ERRORLOG: "-"
      GUNICORN_PRELOAD_APP: "false"

      # ===== 运维开关 =====
      DEBUG_MODE: "false"
      ENABLE_AI: "true"
      ENABLE_DEBUG_LOG: "false"
      FOCUS_GENERATION_ACCESS_LOG: "true"
      SUPPRESS_STATUS_POLL_ACCESS_LOG: "true"
      ENABLE_WEB_SEARCH: "true"
      ENABLE_VISION: "true"

      # ===== 联网搜索接入 =====
      ZHIPU_API_KEY: "${ZHIPU_API_KEY}"
      ZHIPU_SEARCH_ENGINE: "search_pro"

      # ===== 安全鉴权与短信登录 =====
      SECRET_KEY: "${SECRET_KEY}"
      AUTH_DB_PATH: "${AUTH_DB_PATH}"
      LICENSE_DB_PATH: "${LICENSE_DB_PATH}"
      META_INDEX_DB_PATH: "${META_INDEX_DB_PATH}"
      LICENSE_ENFORCEMENT_ENABLED: "true"
      LICENSE_CODE_SIGNING_SECRET: "${LICENSE_CODE_SIGNING_SECRET:-}"
      ADMIN_PHONE_NUMBERS: "${ADMIN_PHONE_NUMBERS:-13886047722,13517223785,18520147505}"
      SMS_LOGIN_ENABLED: "true"
      SMS_PROVIDER: "jdcloud"
      SMS_CODE_SIGNING_SECRET: "${SMS_CODE_SIGNING_SECRET}"
      JD_SMS_ACCESS_KEY_ID: "${JD_SMS_ACCESS_KEY_ID}"
      JD_SMS_ACCESS_KEY_SECRET: "${JD_SMS_ACCESS_KEY_SECRET}"
      JD_SMS_REGION_ID: "cn-north-1"
      JD_SMS_SIGN_ID: "${JD_SMS_SIGN_ID}"
      JD_SMS_TEMPLATE_ID_LOGIN: "${JD_SMS_TEMPLATE_ID_LOGIN}"
      JD_SMS_TEMPLATE_ID_BIND: "${JD_SMS_TEMPLATE_ID_BIND}"
      JD_SMS_TEMPLATE_ID_RECOVER: "${JD_SMS_TEMPLATE_ID_RECOVER}"
      JD_SMS_TIMEOUT: "8.0"

      # ===== 场景目录与实例隔离 =====
      BUILTIN_SCENARIOS_DIR: "resources/scenarios/builtin"
      CUSTOM_SCENARIOS_DIR: "data/scenarios/custom"
      INSTANCE_SCOPE_KEY: "wjkuhannejiw-sealosbja-site"
      INSTANCE_SCOPE_ENFORCEMENT_ENABLED: "false"

      # ===== 微信登录 =====
      WECHAT_LOGIN_ENABLED: "true"
      WECHAT_APP_ID: "${WECHAT_APP_ID}"
      WECHAT_APP_SECRET: "${WECHAT_APP_SECRET}"
      WECHAT_REDIRECT_URI: "https://wjkuhannejiw.sealosbja.site/api/auth/wechat/callback"
      WECHAT_OAUTH_SCOPE: "snsapi_login"

      # ===== 图片理解接入 =====
      VISION_API_URL: "https://open.bigmodel.cn/api/paas/v4/chat/completions"

      # ===== Refly 工作流 =====
      REFLY_API_URL: "https://api.refly.ai/v1"
      REFLY_API_KEY: "${REFLY_API_KEY}"
      REFLY_WORKFLOW_ID: "c-n92xko0yetixzg7ytxf6ck5e"
      REFLY_INPUT_FIELD: "input"
      REFLY_FILES_FIELD: "files"

      # ===== 对象存储 =====
      OBJECT_STORAGE_ENDPOINT: "https://objectstorageapi.bja.sealos.run"
      OBJECT_STORAGE_REGION: "us-east-1"
      OBJECT_STORAGE_BUCKET: "ugdzgqja-deep-vision-s3"
      OBJECT_STORAGE_ACCESS_KEY_ID: "${OBJECT_STORAGE_ACCESS_KEY_ID}"
      OBJECT_STORAGE_SECRET_ACCESS_KEY: "${OBJECT_STORAGE_SECRET_ACCESS_KEY}"
      OBJECT_STORAGE_FORCE_PATH_STYLE: "true"
      OBJECT_STORAGE_SIGNATURE_VERSION: "v4"
      OBJECT_STORAGE_PREFIX: "deepvision"
