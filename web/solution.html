<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon" href="favicon.svg">
    <title>DeepVision 查看方案</title>
    <link rel="stylesheet" href="vendor/css/fonts.css">
    <link rel="stylesheet" href="solution.css?v=20260314-solution-v19">
</head>
<body>
    <div class="solution-page">
        <main class="solution-main">
            <section class="solution-state-card" id="solution-state-card">
                <div class="solution-state-badge">正在准备</div>
                <h1 class="solution-state-title">正在生成方案视图</h1>
                <p class="solution-state-text">系统会根据当前访谈报告内容提炼差异化方案，请稍候。</p>
            </section>

            <div class="solution-shell" id="solution-shell" hidden>
                <div class="solution-topbar">
                    <div class="solution-topbar-main">
                        <nav class="solution-nav" id="solution-nav"></nav>
                    </div>
                </div>

                <section class="solution-quality-strip solution-glass-card solution-reveal" id="solution-quality-strip" hidden></section>

                <section class="solution-hero solution-reveal" id="hero" data-solution-section>
                    <div class="solution-hero-copy">
                        <div class="solution-hero-copy-top">
                            <div class="solution-eyebrow" id="solution-hero-eyebrow">DeepVision 差异化方案</div>
                        </div>
                        <div class="solution-hero-heading">
                            <h1 class="solution-title" id="solution-title"></h1>
                            <p class="solution-subtitle" id="solution-subtitle"></p>
                        </div>
                        <article class="solution-hero-summary solution-glass-card" id="solution-hero-summary"></article>
                        <div class="solution-hero-highlight-grid" id="solution-hero-highlights"></div>
                    </div>
                    <div class="solution-hero-panel">
                        <div class="solution-hero-panel-stack">
                            <article class="solution-panel-card solution-glass-card" id="solution-hero-actions-card">
                                <div class="solution-panel-kicker">首轮行动</div>
                                <h2 class="solution-panel-title">现在先做什么</h2>
                                <div class="solution-panel-list" id="solution-hero-actions"></div>
                            </article>
                            <article class="solution-panel-card solution-glass-card" id="solution-hero-metrics-card">
                                <div class="solution-panel-kicker">质量指标</div>
                                <h2 class="solution-panel-title">方案事实密度</h2>
                                <div class="solution-panel-metrics" id="solution-hero-metrics"></div>
                            </article>
                        </div>
                    </div>
                </section>

                <div class="solution-sections" id="solution-sections"></div>
            </div>
        </main>
    </div>

    <aside class="solution-evidence-drawer" id="solution-evidence-drawer" hidden>
        <div class="solution-evidence-backdrop" data-evidence-close></div>
        <div class="solution-evidence-panel">
            <div class="solution-evidence-head">
                <div>
                    <div class="solution-evidence-kicker">证据锚点</div>
                    <div class="solution-evidence-title" id="solution-evidence-title">当前章节证据</div>
                </div>
                <button type="button" class="solution-evidence-close" data-evidence-close>关闭</button>
            </div>
            <div class="solution-evidence-body" id="solution-evidence-body"></div>
        </div>
    </aside>

    <script src="solution.js?v=20260314-solution-v19"></script>
</body>
</html>
