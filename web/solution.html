<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon" href="favicon.svg">
    <title>DeepVision 查看方案</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vendor/css/fonts.css">
    <link rel="stylesheet" href="solution.css?v=20260316-solution-v59">
</head>

<body>
    <div class="solution-page">
        <main class="solution-main">
            <section class="solution-state-card" id="solution-state-card">
                <div class="solution-state-badge">正在准备</div>
                <h1 class="solution-state-title">正在生成方案视图</h1>
                <p class="solution-state-text">系统会根据当前访谈报告内容生成决策型方案视图，请稍候。</p>
            </section>

            <div class="solution-shell layout-has-sidebar" id="solution-shell" hidden>
                <aside class="solution-toc-sidebar" id="solution-toc-sidebar">
                    <div class="solution-toc-sticky">
                        <div class="solution-toc-header">方案大纲</div>
                        <nav class="solution-toc-nav" id="solution-toc-nav"></nav>
                    </div>
                </aside>
                
                <div class="solution-shell-main">
                    <header class="solution-topbar" id="solution-topbar"></header>
                    <section class="solution-quality-strip" id="solution-quality-strip" hidden></section>
                    <div class="solution-content" id="solution-content"></div>
                </div>

                <div class="solution-action-bar" hidden>
                    <button type="button" class="solution-action-btn" id="btn-share">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                        分享方案
                    </button>
                    <button type="button" class="solution-action-btn is-primary" id="btn-export">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        导出 PDF
                    </button>
                </div>
            </div>
        </main>
    </div>

    <nav class="solution-mobile-nav" id="solution-mobile-nav" hidden></nav>

    <aside class="solution-evidence-drawer" id="solution-evidence-drawer" hidden>
        <div class="solution-evidence-backdrop" data-evidence-close></div>
        <div class="solution-evidence-panel">
            <div class="solution-evidence-head">
                <div>
                    <div class="solution-evidence-kicker">证据锚点</div>
                    <div class="solution-evidence-title" id="solution-evidence-title">当前章节证据</div>
                </div>
                <button type="button" class="solution-evidence-close" data-evidence-close>关闭</button>
            </div>
            <div class="solution-evidence-body" id="solution-evidence-body"></div>
        </div>
    </aside>

    <script src="solution.js?v=20260316-solution-v59"></script>
</body>

</html>
